<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1f4f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#091428;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0c040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffdf80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f9eff;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#4f9eff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1600" height="400" fill="url(#bg)"/>

  <!-- 격자 패턴 -->
  <g opacity="0.06" stroke="#4f9eff" stroke-width="1">
    <line x1="0" y1="80" x2="1600" y2="80"/>
    <line x1="0" y1="160" x2="1600" y2="160"/>
    <line x1="0" y1="240" x2="1600" y2="240"/>
    <line x1="0" y1="320" x2="1600" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="1400" y1="0" x2="1400" y2="400"/>
  </g>

  <!-- 주식 차트 라인 (오른쪽) -->
  <g filter="url(#glow)" opacity="0.7">
    <polyline
      points="900,320 960,290 1010,300 1070,240 1120,260 1180,180 1240,200 1290,140 1350,160 1400,100 1450,120 1500,70 1560,90 1600,60"
      fill="none" stroke="url(#chartLine)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- 차트 아래 채우기 -->
    <polygon
      points="900,320 960,290 1010,300 1070,240 1120,260 1180,180 1240,200 1290,140 1350,160 1400,100 1450,120 1500,70 1560,90 1600,60 1600,400 900,400"
      fill="#4f9eff" opacity="0.04"/>
  </g>

  <!-- 두번째 차트 라인 -->
  <g opacity="0.4">
    <polyline
      points="900,350 970,330 1040,340 1100,290 1160,310 1220,260 1280,280 1340,230 1400,250 1460,200 1520,220 1580,170 1600,180"
      fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-dasharray="6,3" stroke-linejoin="round"/>
  </g>

  <!-- AI 뉴럴 네트워크 노드 (왼쪽) -->
  <g opacity="0.25" filter="url(#softglow)">
    <!-- 연결선 -->
    <line x1="80" y1="100" x2="180" y2="180" stroke="#4f9eff" stroke-width="1"/>
    <line x1="80" y1="100" x2="160" y2="80" stroke="#4f9eff" stroke-width="1"/>
    <line x1="180" y1="180" x2="280" y2="140" stroke="#4f9eff" stroke-width="1"/>
    <line x1="180" y1="180" x2="260" y2="250" stroke="#4f9eff" stroke-width="1"/>
    <line x1="160" y1="80" x2="280" y2="140" stroke="#4f9eff" stroke-width="1"/>
    <line x1="280" y1="140" x2="380" y2="100" stroke="#4f9eff" stroke-width="1"/>
    <line x1="280" y1="140" x2="370" y2="200" stroke="#4f9eff" stroke-width="1"/>
    <line x1="260" y1="250" x2="370" y2="200" stroke="#4f9eff" stroke-width="1"/>
    <line x1="370" y1="200" x2="460" y2="160" stroke="#4f9eff" stroke-width="1"/>
    <line x1="80" y1="300" x2="180" y2="180" stroke="#4f9eff" stroke-width="1"/>
    <line x1="80" y1="300" x2="260" y2="250" stroke="#4f9eff" stroke-width="1"/>
    <!-- 노드 -->
    <circle cx="80" cy="100" r="5" fill="#4f9eff"/>
    <circle cx="80" cy="300" r="5" fill="#4f9eff"/>
    <circle cx="160" cy="80" r="4" fill="#00e5ff"/>
    <circle cx="180" cy="180" r="6" fill="#4f9eff"/>
    <circle cx="260" cy="250" r="4" fill="#00e5ff"/>
    <circle cx="280" cy="140" r="7" fill="#4f9eff"/>
    <circle cx="370" cy="200" r="5" fill="#00e5ff"/>
    <circle cx="380" cy="100" r="4" fill="#4f9eff"/>
    <circle cx="460" cy="160" r="5" fill="#4f9eff"/>
  </g>

  <!-- 원형 장식 (배경 글로우) -->
  <circle cx="800" cy="200" r="300" fill="#1a3a6e" opacity="0.08"/>
  <circle cx="800" cy="200" r="200" fill="#1a4a8e" opacity="0.06"/>

  <!-- 중앙 텍스트 -->
  <text x="800" y="170" text-anchor="middle" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="2" filter="url(#glow)">오늘의트렌드</text>

  <!-- 골드 언더라인 -->
  <rect x="630" y="185" width="340" height="3" rx="2" fill="url(#gold)" opacity="0.9"/>

  <!-- 서브타이틀 -->
  <text x="800" y="230" text-anchor="middle" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="18" font-weight="400" fill="#a0c4ff" letter-spacing="4" opacity="0.85">재테크 · AI · 트렌드 인사이트</text>

  <!-- 하단 태그들 -->
  <g opacity="0.6">
    <rect x="610" y="265" width="90" height="26" rx="13" fill="#1a3a6e" stroke="#4f9eff" stroke-width="1"/>
    <text x="655" y="282" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4f9eff">#ETF투자</text>

    <rect x="712" y="265" width="90" height="26" rx="13" fill="#1a3a6e" stroke="#4f9eff" stroke-width="1"/>
    <text x="757" y="282" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4f9eff">#AI활용법</text>

    <rect x="814" y="265" width="90" height="26" rx="13" fill="#1a3a6e" stroke="#4f9eff" stroke-width="1"/>
    <text x="859" y="282" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4f9eff">#재테크</text>

    <rect x="916" y="265" width="90" height="26" rx="13" fill="#1a3a6e" stroke="#4f9eff" stroke-width="1"/>
    <text x="961" y="282" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4f9eff">#주식투자</text>
  </g>

  <!-- 우측 상단 장식 원 -->
  <circle cx="1520" cy="50" r="80" fill="#1a4a8e" opacity="0.12"/>
  <circle cx="1520" cy="50" r="50" fill="#2a5aae" opacity="0.10"/>

  <!-- 좌측 하단 장식 -->
  <circle cx="60" cy="380" r="60" fill="#1a3a6e" opacity="0.10"/>
</svg>
